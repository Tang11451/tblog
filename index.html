<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人Blog · 玻璃操作面板</title>
    <style>
        :root {
            --bg-deep: #1a1040;
            --bg-mid1: #3d2b6d;
            --bg-mid2: #8b3a62;
            --bg-mid3: #c9626b;
            --bg-light: #f2c9b8;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-highlight: rgba(255, 255, 255, 0.06);
            --text-primary: #f5f0eb;
            --text-soft: #e8dfd6;
            --shadow-soft: 0 10px 50px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 80px rgba(180, 140, 200, 0.2);
            --btn1-color: #f0a58f;
            --btn1-glow: rgba(240, 165, 143, 0.5);
            --btn2-color: #f5cfa0;
            --btn2-glow: rgba(245, 207, 160, 0.5);
            --btn3-color: #a0c8f5;
            --btn3-glow: rgba(160, 200, 245, 0.5);
            --transition-bounce: 0.5s cubic-bezier(0.22, 1.05, 0.48, 1.02);
            --transition-smooth: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg,
                    #0f0a28 0%,
                    #1a1040 8%,
                    #2d1b5e 18%,
                    #3d2b6d 28%,
                    #5c2d6b 40%,
                    #8b3a62 54%,
                    #b84d5e 66%,
                    #d97868 78%,
                    #eca884 88%,
                    #f5d0bb 95%,
                    #fbe8da 100%);
            background-attachment: fixed;
            font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            padding: 20px;
        }

        /* ========== 背景装饰光晕 ========== */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
            opacity: 0.55;
            animation: orbFloat 18s ease-in-out infinite;
        }
        .bg-orb--1 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(140,100,210,0.55) 0%, transparent 70%); top: -8%; right: -6%; animation-duration: 20s; }
        .bg-orb--2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(220,140,150,0.5) 0%, transparent 70%); bottom: -10%; left: -5%; animation-duration: 22s; }
        .bg-orb--3 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(180,160,220,0.4) 0%, transparent 70%); top: 35%; left: 55%; animation-duration: 16s; }
        .bg-orb--4 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(245,185,160,0.4) 0%, transparent 70%); top: 15%; left: 12%; animation-duration: 19s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0,0) scale(1); }
            15% { transform: translate(30px,-40px) scale(1.08); }
            30% { transform: translate(-20px,25px) scale(0.94); }
            45% { transform: translate(-35px,-15px) scale(1.05); }
            60% { transform: translate(25px,30px) scale(0.91); }
            75% { transform: translate(10px,-35px) scale(1.06); }
            90% { transform: translate(-15px,10px) scale(0.97); }
        }

        /* 微光粒子 */
        .sparkles {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .sparkle {
            position: absolute; width: 3px; height: 3px; border-radius: 50%;
            background: rgba(255,255,255,0.7); animation: sparkleFloat 8s ease-in-out infinite;
        }
        .sparkle:nth-child(1){ top:20%; left:75%; }
        .sparkle:nth-child(2){ top:55%; left:18%; animation-delay:-3s; width:3.5px; height:3.5px; }
        .sparkle:nth-child(3){ top:30%; left:30%; animation-delay:-5.5s; width:2px; height:2px; }
        .sparkle:nth-child(4){ top:65%; left:70%; animation-delay:-7s; }
        .sparkle:nth-child(5){ top:12%; left:50%; animation-delay:-2s; width:2px; height:2px; }
        .sparkle:nth-child(6){ top:78%; left:40%; animation-delay:-4.5s; }
        .sparkle:nth-child(7){ top:42%; left:82%; animation-delay:-6s; }
        .sparkle:nth-child(8){ top:8%; left:22%; animation-delay:-1.5s; width:2px; height:2px; }

        @keyframes sparkleFloat {
            0%, 100% { opacity:0.2; transform: translateY(0) scale(1); }
            25% { opacity:0.9; transform: translateY(-25px) scale(1.8); }
            50% { opacity:0.35; transform: translateY(-10px) scale(0.7); }
            75% { opacity:0.75; transform: translateY(-30px) scale(1.4); }
        }

        /* ========== 主容器 ========== */
        .main-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 820px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== 玻璃面板 - 扩大 & 左右布局 ========== */
        .glass-panel {
            position: relative;
            width: 100%;
            min-height: 460px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(140%);
            -webkit-backdrop-filter: blur(28px) saturate(140%);
            border: 1.5px solid var(--glass-border);
            border-radius: 32px;
            padding: 28px 32px;
            box-shadow:
                var(--shadow-soft),
                var(--shadow-glow),
                inset 0 1px 0 rgba(255,255,255,0.1),
                inset 0 -2px 0 rgba(0,0,0,0.06);
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 24px;
            transition: all 0.5s ease;
            overflow: visible;
        }

        /* 面板顶部高光线 */
        .glass-panel::before {
            content: ''; position: absolute; top: 10px; left: 24px; right: 24px;
            height: 1px; border-radius: 1px; pointer-events: none; z-index: 3;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 15%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0.35) 85%, transparent 100%);
        }
        .glass-panel::after {
            content: ''; position: absolute; bottom: 8px; left: 30px; right: 30px;
            height: 1px; border-radius: 1px; pointer-events: none; z-index: 3;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 30%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.08) 70%, transparent 100%);
        }

        /* ========== 左侧导航栏 ========== */
        .left-nav {
            flex: 0 0 auto;
            width: 62px;                /* 仅容纳默认圆形按钮 */
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
            position: relative;
            z-index: 5;                /* 高于内容区，让文字溢出可见 */
            overflow: visible;
        }

        /* ========== 右侧内容区 ========== */
        .content-area {
            flex: 1;
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 26px 24px;
            display: flex;
            flex-direction: column;
            color: var(--text-soft);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
            min-height: 300px;
            transition: all 0.4s ease;
        }

        .content-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            opacity: 0.7;
        }
        .content-placeholder .icon-large {
            font-size: 3.2rem;
            margin-bottom: 16px;
        }
        .content-placeholder p {
            font-size: 1rem;
            letter-spacing: 0.03em;
            line-height: 1.6;
        }

        /* ========== 按钮通用样式 (保持原有风格) ========== */
        .btn-expand {
            position: relative;
            height: 58px;
            min-width: 58px;
            width: 58px;
            border-radius: 29px;
            border: 1.5px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            padding: 0;
            white-space: nowrap;
            overflow: visible;        /* 允许文字溢出 */
            transition:
                width var(--transition-bounce),
                min-width var(--transition-bounce),
                background var(--transition-smooth),
                border-color var(--transition-smooth),
                box-shadow var(--transition-smooth),
                transform 0.3s cubic-bezier(0.22,1.05,0.48,1.02);
            box-shadow: 0 4px 18px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.12);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            color: var(--text-primary);
            font-family: inherit;
            letter-spacing: 0.03em;
            margin: 0;
        }

        .btn-expand:active {
            transform: scale(0.95);
            transition: transform 0.15s cubic-bezier(0.22,1.05,0.48,1.02);
        }

        .btn-expand .btn-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            font-size: 1.25rem;
            font-weight: 600;
            pointer-events: none;
            margin-left: 2px;
            transition: all var(--transition-smooth);
        }

        .btn-expand .btn-label {
            display: inline-block;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            transition:
                max-width var(--transition-bounce),
                opacity 0.35s ease,
                padding-right 0.35s ease;
            pointer-events: none;
            white-space: nowrap;
            padding-right: 0;
            color: var(--text-soft);
        }

        /* Hover 展开 (桌面) */
        .btn-expand:hover {
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 8px 30px rgba(0,0,0,0.22), 0 0 0 4px var(--btn-glow, rgba(255,255,255,0.15)), inset 0 1px 0 rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.17);
            z-index: 10;
        }
        .btn-expand:hover .btn-label {
            max-width: 130px;
            opacity: 1;
            padding-right: 16px;
        }
        .btn-expand:hover .btn-icon {
            margin-left: 0;
        }

        /* 按钮1 - “我” */
        .btn-expand--me {
            --btn-glow: var(--btn1-glow);
        }
        .btn-expand--me:hover {
            width: 172px;
            min-width: 172px;
            border-color: rgba(240,165,143,0.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 0 0 5px var(--btn1-glow), 0 0 50px rgba(240,165,143,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
            background: rgba(240,165,143,0.18);
        }
        .btn-expand--me .btn-icon { font-size: 1.3rem; font-weight: 700; }

        /* 按钮2 - 📄 */
        .btn-expand--articles {
            --btn-glow: var(--btn2-glow);
        }
        .btn-expand--articles:hover {
            width: 158px;
            min-width: 158px;
            border-color: rgba(245,207,160,0.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 0 0 5px var(--btn2-glow), 0 0 50px rgba(245,207,160,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
            background: rgba(245,207,160,0.17);
        }
        .btn-expand--articles .btn-icon { font-size: 1.35rem; }

        /* 按钮3 - </> */
        .btn-expand--code {
            --btn-glow: var(--btn3-glow);
        }
        .btn-expand--code:hover {
            width: 158px;
            min-width: 158px;
            border-color: rgba(160,200,245,0.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 0 0 5px var(--btn3-glow), 0 0 50px rgba(160,200,245,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
            background: rgba(160,200,245,0.16);
        }
        .btn-expand--code .btn-icon {
            font-size: 1.1rem; font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', 'PingFang SC', monospace;
        }

        /* 左侧导航中悬停按钮时，其他按钮轻微透明 */
        .left-nav:hover .btn-expand:not(:hover) {
            opacity: 0.7;
            transition: opacity 0.4s ease;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 760px) {
            .glass-panel {
                flex-direction: column;
                align-items: stretch;
                padding: 20px;
                gap: 18px;
                min-height: auto;
                border-radius: 24px;
            }
            .left-nav {
                width: auto;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 12px;
                justify-content: center;
                overflow: visible;
            }
            .btn-expand {
                height: 50px;
                min-width: 50px;
                width: 50px;
                border-radius: 25px;
            }
            .btn-expand .btn-icon { font-size: 1.05rem; margin-left: 1px; width: 36px; height: 36px; }
            .btn-expand .btn-label { font-size: 0.85rem; }
            .btn-expand--me:hover { width: 155px; min-width: 155px; }
            .btn-expand--articles:hover,
            .btn-expand--code:hover { width: 140px; min-width: 140px; }
            .btn-expand:hover .btn-label { max-width: 110px; padding-right: 10px; }

            .content-area {
                min-height: 200px;
                padding: 18px;
            }
        }

        @media (max-width: 480px) {
            .glass-panel {
                padding: 14px;
                gap: 12px;
                border-radius: 18px;
            }
            .left-nav {
                gap: 8px;
            }
            .btn-expand {
                height: 44px;
                min-width: 44px;
                width: 44px;
                border-radius: 22px;
            }
            .btn-expand .btn-icon { font-size: 0.9rem; width: 30px; height: 30px; }
            .btn-expand .btn-label { font-size: 0.8rem; }
            .btn-expand--me:hover { width: 140px; min-width: 140px; }
            .btn-expand--articles:hover,
            .btn-expand--code:hover { width: 128px; min-width: 128px; }
            .btn-expand:hover .btn-label { max-width: 90px; padding-right: 6px; }
        }

        /* 触摸设备：使用 focus 展开，保留原有逻辑 */
        @media (hover: none) and (pointer: coarse) {
            .btn-expand:focus {
                border-color: rgba(255,255,255,0.5);
                box-shadow: 0 8px 30px rgba(0,0,0,0.22), 0 0 0 4px var(--btn-glow, rgba(255,255,255,0.15)), inset 0 1px 0 rgba(255,255,255,0.18);
                background: rgba(255,255,255,0.17);
                z-index: 10;
            }
            .btn-expand:focus .btn-label {
                max-width: 130px;
                opacity: 1;
                padding-right: 16px;
            }
            .btn-expand:focus .btn-icon { margin-left: 0; }
            .btn-expand--me:focus { width: 172px; min-width: 172px; }
            .btn-expand--articles:focus,
            .btn-expand--code:focus { width: 158px; min-width: 158px; }
        }
    </style>
</head>
<body>

    <!-- 背景光晕 -->
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="bg-orb bg-orb--4"></div>

    <div class="sparkles">
        <span class="sparkle"></span><span class="sparkle"></span>
        <span class="sparkle"></span><span class="sparkle"></span>
        <span class="sparkle"></span><span class="sparkle"></span>
        <span class="sparkle"></span><span class="sparkle"></span>
    </div>

    <div class="main-wrapper">
        <!-- 玻璃面板：左按钮 + 右内容区 -->
        <div class="glass-panel" role="group" aria-label="导航操作面板">

            <!-- 左侧按钮导航 -->
            <nav class="left-nav">
                <button class="btn-expand btn-expand--me" aria-label="了解一下我" title="了解一下我">
                    <span class="btn-icon">我</span>
                    <span class="btn-label">了解一下我</span>
                </button>
                <button class="btn-expand btn-expand--articles" aria-label="我的文章" title="我的文章">
                    <span class="btn-icon">📄</span>
                    <span class="btn-label">我的文章</span>
                </button>
                <button class="btn-expand btn-expand--code" aria-label="编程随想" title="编程随想">
                    <span class="btn-icon">&lt;/&gt;</span>
                    <span class="btn-label">编程随想</span>
                </button>
            </nav>

            <!-- 右侧内容区（可嵌套其他面板） -->
            <div class="content-area">
                <div class="content-placeholder">
                    <span class="icon-large">✨</span>
                    <p>点击左侧按钮<br>这里会展示对应内容</p>
                </div>
            </div>

        </div>
    </div>

    <!-- 交互脚本：移动端点击展开/收起，Esc收起 -->
    <script>
        (function() {
            const buttons = document.querySelectorAll('.btn-expand');
            const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

            if (isTouchDevice) {
                document.addEventListener('click', function(e) {
                    const clickedOnButton = e.target.closest('.btn-expand');
                    buttons.forEach(btn => {
                        if (clickedOnButton === btn) {
                            if (btn.matches(':focus')) {
                                btn.blur();
                            } else {
                                btn.focus();
                            }
                        } else {
                            btn.blur();
                        }
                    });
                });
                buttons.forEach(btn => {
                    btn.addEventListener('touchstart', function(e) {
                        if (document.activeElement === btn && btn.matches(':focus')) {
                            e.preventDefault();
                            btn.blur();
                        }
                    });
                });
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    buttons.forEach(btn => btn.blur());
                }
            });
        })();
    </script>
</body>
</html>
